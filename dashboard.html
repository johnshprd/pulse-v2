<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f7f8fc; --surface:#ffffff; --surface2:#eeeef6;
    --g1:#4f46e5; --g2:#3730a3; --g3:#312e81;
    --text:#161528; --muted:#8a87a3; --muted2:#5f5c78;
    --border:#e7e6f2; --border2:#d9d7ec;
    --amber:#d97706; --green:#16a34a; --grey:#c7c5d8;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; height:100%; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; }

  #loading{ position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:999; }
  .loading-logo{ font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:5px; color:var(--g1); }

  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px 12px; background:var(--surface); border-bottom:1px solid var(--border); }
  .logo{ font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:4px; color:var(--g1); }
  .goal-pill{ display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border2); border-radius:18px; padding:5px 12px; }
  .goal-pill span:first-child{ font-family:'Space Mono',monospace; font-size:0.64rem; color:var(--muted); letter-spacing:1px; }
  .goal-pill span:last-child{ font-family:'Bebas Neue',sans-serif; font-size:1.05rem; color:var(--g1); }

  .content{ flex:1; padding:16px 16px 90px; }

  .coach-bubble{ background:var(--g1); border-radius:14px; padding:14px; margin-bottom:16px; }
  .coach-bubble p{ font-family:'DM Sans',sans-serif; font-size:0.84rem; color:#fff; line-height:1.4; margin:0; }

  .daily-summary{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding:0 2px; }
  .daily-total{ display:flex; align-items:baseline; gap:5px; }
  .daily-total .val{ font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--text); }
  .daily-total .of{ font-family:'DM Sans',sans-serif; font-size:0.84rem; color:var(--muted); }
  .daily-left{ font-family:'Space Mono',monospace; font-size:0.68rem; color:var(--muted2); letter-spacing:1px; text-align:right; }
  .daily-left b{ color:var(--g1); font-size:0.86rem; }

  .strip{ display:flex; gap:6px; margin-bottom:16px; }
  .segment{ flex:1; text-align:center; padding:10px 4px; border-radius:10px; border:1.5px solid var(--border2); background:var(--surface); cursor:pointer; position:relative; overflow:hidden; }
  .segment.active{ border-color:var(--g1); background:rgba(79,70,229,0.07); }
  .segment.hit{ border-color:var(--green); }
  .segment.missed{ border-color:var(--amber); }
  .seg-fill{ position:absolute; bottom:0; left:0; right:0; background:rgba(79,70,229,0.14); z-index:0; transition:height 0.4s; }
  .segment.hit .seg-fill{ background:rgba(22,163,74,0.14); }
  .segment.missed .seg-fill{ background:rgba(217,119,6,0.14); }
  .seg-content{ position:relative; z-index:1; }
  .seg-label{ font-family:'Space Mono',monospace; font-size:0.62rem; letter-spacing:1px; color:var(--muted2); text-transform:uppercase; margin-bottom:2px; }
  .segment.active .seg-label{ color:var(--g1); font-weight:700; }
  .seg-pct{ font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--text); }
  .segment.hit .seg-pct{ color:var(--green); }
  .segment.missed .seg-pct{ color:var(--amber); }
  .segment.active .seg-pct{ color:var(--g1); }

  .expanded-card{ background:var(--surface); border:1.5px solid var(--g1); border-radius:16px; padding:16px; margin-bottom:12px; }
  .expanded-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .expanded-title{ font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--text); letter-spacing:0.5px; }
  .expanded-window{ font-family:'Space Mono',monospace; font-size:0.66rem; color:var(--muted); letter-spacing:1px; }
  .expanded-sub{ font-family:'DM Sans',sans-serif; font-size:0.82rem; color:var(--muted2); margin-bottom:14px; }
  .expanded-sub b{ color:var(--g1); }

  .btn-log-meal{ background:var(--g1); color:#fff; border:none; border-radius:12px; width:100%; padding:15px; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; margin-bottom:10px; }

  .logged-item{ display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px solid var(--border); }
  .logged-swatch{ width:28px; height:28px; border-radius:7px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
  .logged-name{ flex:1; font-family:'DM Sans',sans-serif; font-size:0.84rem; font-weight:600; color:var(--text); }
  .logged-protein{ font-family:'Space Mono',monospace; font-size:0.78rem; color:var(--g1); font-weight:700; }
  .logged-remove{ background:none; border:none; color:var(--muted); font-size:0.9rem; cursor:pointer; padding:2px 4px; }

  .empty-state{ text-align:center; padding:12px 8px; font-family:'DM Sans',sans-serif; font-size:0.82rem; color:var(--muted2); line-height:1.4; }

  .collapsed-list{ display:flex; flex-direction:column; gap:8px; }
  .collapsed-row{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 12px; cursor:pointer; }
  .collapsed-row.hit{ border-color:rgba(22,163,74,0.3); }
  .collapsed-row.missed{ border-color:rgba(217,119,6,0.3); }
  .collapsed-dot{ width:9px; height:9px; border-radius:50%; background:var(--grey); flex-shrink:0; }
  .collapsed-row.hit .collapsed-dot{ background:var(--green); }
  .collapsed-row.missed .collapsed-dot{ background:var(--amber); }
  .collapsed-info{ flex:1; }
  .collapsed-info h5{ font-family:'DM Sans',sans-serif; font-size:0.86rem; font-weight:700; margin:0; color:var(--text); }
  .collapsed-info span{ font-family:'Space Mono',monospace; font-size:0.66rem; color:var(--muted2); letter-spacing:0.5px; }
  .collapsed-stat{ font-family:'Bebas Neue',sans-serif; font-size:1.05rem; color:var(--muted2); }
  .collapsed-row.hit .collapsed-stat{ color:var(--green); }
  .collapsed-row.missed .collapsed-stat{ color:var(--amber); }

  .fab{ position:fixed; bottom:24px; right:calc(50% - 240px + 24px); width:56px; height:56px; border-radius:50%; background:var(--g1); color:#fff; border:none; font-size:1.7rem; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(79,70,229,0.4); cursor:pointer; z-index:50; }
  @media (max-width:480px){ .fab{ right:24px; } }

  /* Add-meal sheet */
  .sheet-backdrop{ position:fixed; inset:0; background:rgba(20,15,60,0.4); z-index:100; display:none; }
  .sheet-backdrop.open{ display:block; }
  .sheet{ position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto; background:var(--surface); border-radius:20px 20px 0 0; z-index:101; max-height:82vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.25s ease; padding-bottom:20px; }
  .sheet.open{ transform:translateY(0); }
  .sheet-handle{ width:36px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 6px; }
  .sheet-header{ display:flex; align-items:center; justify-content:space-between; padding:6px 18px 12px; border-bottom:1px solid var(--border); }
  .sheet-title{ font-family:'Space Mono',monospace; font-size:0.72rem; letter-spacing:2px; color:var(--muted2); text-transform:uppercase; }
  .sheet-close{ background:var(--surface2); border:none; width:28px; height:28px; border-radius:50%; color:var(--muted2); cursor:pointer; }
  .sheet-body{ padding:16px 18px; }

  .search-bar{ display:flex; align-items:center; gap:8px; background:var(--surface2); border:1.5px solid var(--border2); border-radius:12px; padding:11px 13px; margin-bottom:12px; }
  .search-bar input{ border:none; outline:none; background:none; font-family:'DM Sans',sans-serif; font-size:0.88rem; color:var(--text); width:100%; }
  .food-result{ display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid var(--border); cursor:pointer; }
  .food-swatch{ width:34px; height:34px; border-radius:8px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:1.05rem; flex-shrink:0; }
  .food-info{ flex:1; min-width:0; }
  .food-info h5{ font-family:'DM Sans',sans-serif; font-size:0.84rem; font-weight:700; margin:0 0 1px; color:var(--text); }
  .food-info span{ font-family:'Space Mono',monospace; font-size:0.66rem; color:var(--muted2); }
  .food-add-btn{ width:26px; height:26px; border-radius:50%; background:var(--g1); color:#fff; border:none; font-size:0.95rem; flex-shrink:0; cursor:pointer; }

  .portion-step{ display:none; }
  .portion-step.active{ display:block; }
  .portion-food-name{ font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--text); margin-bottom:4px; }
  .portion-field{ display:flex; align-items:center; gap:10px; background:var(--surface2); border:1.5px solid var(--border2); border-radius:12px; padding:12px 14px; margin:14px 0; }
  .portion-field input{ border:none; outline:none; background:none; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--text); width:100%; }
  .portion-field .unit{ font-family:'Space Mono',monospace; font-size:0.8rem; color:var(--muted); }
  .portion-calc{ font-family:'DM Sans',sans-serif; font-size:0.86rem; color:var(--muted2); margin-bottom:14px; }
  .portion-calc b{ color:var(--g1); }
  .pulse-select{ display:flex; gap:8px; margin-bottom:16px; }
  .pulse-chip{ flex:1; text-align:center; padding:10px 4px; border-radius:10px; border:1.5px solid var(--border2); background:var(--surface); font-family:'Space Mono',monospace; font-size:0.68rem; letter-spacing:1px; color:var(--muted2); cursor:pointer; }
  .pulse-chip.active{ border-color:var(--g1); background:rgba(79,70,229,0.08); color:var(--g1); font-weight:700; }
  .btn-confirm{ background:var(--g1); color:#fff; border:none; border-radius:12px; width:100%; padding:14px; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.92rem; cursor:pointer; }
  .btn-back{ background:none; border:none; color:var(--muted2); font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-bottom:12px; padding:0; }
</style>
</head>
<body>

<div id="loading"><div class="loading-logo">PULSE</div></div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="logo">PULSE</div>
    <div class="goal-pill"><span>GOAL</span><span id="goalVal">—</span></div>
  </div>

  <div class="content">
    <div class="coach-bubble"><p id="coachText">Loading your day…</p></div>

    <div class="daily-summary">
      <div class="daily-total"><span class="val" id="dailyTotal">0</span><span class="of">/ <span id="dailyGoalInline">0</span>g today</span></div>
      <div class="daily-left">LEFT<br><b id="dailyLeft">0g</b></div>
    </div>

    <div class="strip" id="strip"></div>
    <div id="expandedCard"></div>
    <div class="collapsed-list" id="collapsedList"></div>
  </div>

  <button class="fab" id="fabBtn">+</button>
</div>

<!-- Add meal bottom sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheetTitle">Add meal</div>
    <button class="sheet-close" id="sheetClose">✕</button>
  </div>
  <div class="sheet-body">

    <div class="portion-step active" id="stepSearch">
      <div class="search-bar"><span>🔍</span><input id="foodSearchInput" placeholder="Search foods…"></div>
      <div id="foodResults"></div>
    </div>

    <div class="portion-step" id="stepPortion">
      <button class="btn-back" id="backToSearch">← Back to search</button>
      <div class="portion-food-name" id="portionFoodName">—</div>
      <div class="portion-field">
        <input type="number" id="portionGrams" inputmode="decimal">
        <span class="unit">g</span>
      </div>
      <div class="portion-calc">= <b id="portionProtein">0g</b> protein</div>
      <div class="pulse-select" id="pulseSelect"></div>
      <button class="btn-confirm" id="confirmLogBtn">Confirm &amp; log →</button>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/foods.js"></script>
<script>
const SLOT_NAMES = ['Breakfast','Lunch','Dinner','Evening'];
const SLOT_ICONS = ['🌅','☀️','🌙','🌛'];
// Pulse windows as [startHour, endHour) in 24h time — adjust to match onboarding-set values per user later;
// hardcoded defaults here for the v2 starting point.
const SLOT_WINDOWS = [[7,9],[12,15],[18,20],[21,22]];

let currentUser = null;
let state = {
  goal: 150,
  slotTargets: [38,38,37,37],
  slots: [[],[],[],[]],
  customFoods: [],
};
let pendingFood = null;
let pendingSlot = 0;

function distributeGoal(goal){
  const base = Math.floor(goal/4), rem = goal - base*4;
  return [base+(rem>0?1:0), base+(rem>1?1:0), base+(rem>2?1:0), base];
}

function currentHour(){ return new Date().getHours(); }

function activeSlotIndex(){
  const h = currentHour();
  for (let i=0;i<SLOT_WINDOWS.length;i++){
    const [s,e] = SLOT_WINDOWS[i];
    if (h>=s && h<e) return i;
  }
  // If between windows, return the next upcoming one; if past all, return last
  for (let i=0;i<SLOT_WINDOWS.length;i++){ if (h < SLOT_WINDOWS[i][0]) return i; }
  return SLOT_WINDOWS.length-1;
}

function slotStatus(i){
  const total = slotTotal(i);
  const target = state.slotTargets[i];
  const [s,e] = SLOT_WINDOWS[i];
  const h = currentHour();
  if (total >= target && target > 0) return 'hit';
  if (h >= e && total < target) return 'missed';
  return 'neutral';
}

function slotTotal(i){
  return (state.slots[i]||[]).reduce((sum,item)=>sum+item.protein,0);
}

function formatWindow(i){
  const [s,e] = SLOT_WINDOWS[i];
  const fmt = h => { const period = h>=12?'pm':'am'; const hh = h%12===0?12:h%12; return hh+period; };
  return fmt(s)+'–'+fmt(e);
}

async function init(){
  const { data:{ session } } = await db.auth.getSession();
  if (!session){ window.location.href = 'auth.html'; return; }
  currentUser = session.user;

  const { data } = await db.from('user_data').select('*').eq('user_id', currentUser.id).single();
  if (data){
    state.goal = data.goal || 150;
    state.slotTargets = data.slot_targets || distributeGoal(state.goal);
    state.slots = data.slots || [[],[],[],[]];
    state.customFoods = data.custom_foods || [];
  } else {
    state.slotTargets = distributeGoal(state.goal);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}

async function saveUserData(){
  const today = new Date().toISOString().slice(0,10);
  await db.from('user_data').upsert({
    user_id: currentUser.id, goal: state.goal, slot_targets: state.slotTargets,
    slots: state.slots, log_date: today, custom_foods: state.customFoods,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'user_id' });
}

function render(){
  const active = activeSlotIndex();
  const dailyTotal = state.slots.reduce((sum,slot)=>sum+slot.reduce((s,i)=>s+i.protein,0),0);

  document.getElementById('goalVal').textContent = state.goal+'g';
  document.getElementById('dailyTotal').textContent = dailyTotal;
  document.getElementById('dailyGoalInline').textContent = state.goal;
  document.getElementById('dailyLeft').textContent = Math.max(0,state.goal-dailyTotal)+'g';

  // Coach message
  const activeStatus = slotStatus(active);
  const activeTotal = slotTotal(active);
  let coachMsg;
  if (activeTotal === 0){
    coachMsg = `It's ${formatWindow(active).split('–')[0]} now — ${SLOT_NAMES[active]} is open. Log your first meal for this pulse.`;
  } else if (activeStatus === 'hit'){
    coachMsg = `Nice — you've hit your ${SLOT_NAMES[active]} target. ${Math.max(0,state.goal-dailyTotal)}g left for the rest of the day.`;
  } else {
    coachMsg = `${SLOT_NAMES[active]} in progress — ${Math.max(0,state.slotTargets[active]-activeTotal)}g to go for this pulse.`;
  }
  document.getElementById('coachText').textContent = coachMsg;

  // Strip
  const stripEl = document.getElementById('strip');
  stripEl.innerHTML = '';
  for (let i=0;i<4;i++){
    const status = slotStatus(i);
    const total = slotTotal(i);
    const target = state.slotTargets[i];
    const pct = target>0 ? Math.min(100,(total/target)*100) : 0;
    const seg = document.createElement('div');
    seg.className = 'segment' + (i===active?' active':'') + (status==='hit'?' hit':'') + (status==='missed'?' missed':'');
    seg.innerHTML = `
      <div class="seg-fill" style="height:${pct}%;"></div>
      <div class="seg-content">
        <div class="seg-label">P${i+1}${i===active?' · Now':''}</div>
        <div class="seg-pct">${total>0||status==='hit'?total+'g':'—'}${status==='hit'?' ✓':''}</div>
      </div>`;
    seg.onclick = () => { expandedSlot = i; render(); };
    stripEl.appendChild(seg);
  }

  // Expanded card
  const expandIdx = (typeof expandedSlot === 'number') ? expandedSlot : active;
  const ecTotal = slotTotal(expandIdx);
  const ecTarget = state.slotTargets[expandIdx];
  const ecItems = state.slots[expandIdx] || [];
  const ecCard = document.getElementById('expandedCard');
  ecCard.innerHTML = `
    <div class="expanded-card">
      <div class="expanded-head">
        <div class="expanded-title">PULSE ${expandIdx+1} · ${SLOT_NAMES[expandIdx].toUpperCase()}</div>
        <div class="expanded-window">${formatWindow(expandIdx)}</div>
      </div>
      <div class="expanded-sub">${ecItems.length===0?'Nothing logged yet':ecTotal+'g logged'} · <b>${Math.max(0,ecTarget-ecTotal)}g</b> to go for this pulse</div>
      <button class="btn-log-meal" onclick="openSheet(${expandIdx})">+ Log meal for ${SLOT_NAMES[expandIdx].toLowerCase()}</button>
      ${ecItems.length===0
        ? `<div class="empty-state">No meals logged for this pulse yet.</div>`
        : ecItems.map((item,idx)=>`
          <div class="logged-item">
            <div class="logged-swatch">${item.icon||'🍽️'}</div>
            <div class="logged-name">${item.name}</div>
            <div class="logged-protein">${item.protein}g</div>
            <button class="logged-remove" onclick="removeItem(${expandIdx},${idx})">✕</button>
          </div>`).join('')}
    </div>`;

  // Collapsed rows for the other 3
  const collapsedEl = document.getElementById('collapsedList');
  collapsedEl.innerHTML = '';
  for (let i=0;i<4;i++){
    if (i===expandIdx) continue;
    const status = slotStatus(i);
    const total = slotTotal(i);
    const row = document.createElement('div');
    row.className = 'collapsed-row' + (status==='hit'?' hit':'') + (status==='missed'?' missed':'');
    const h = currentHour();
    let subtitle;
    if (status==='hit') subtitle = formatWindow(i)+' · goal hit';
    else if (status==='missed') subtitle = formatWindow(i)+' · missed';
    else if (h < SLOT_WINDOWS[i][0]) subtitle = 'Opens '+formatWindow(i).split('–')[0];
    else subtitle = formatWindow(i);
    row.innerHTML = `
      <div class="collapsed-dot"></div>
      <div class="collapsed-info"><h5>Pulse ${i+1} · ${SLOT_NAMES[i]}</h5><span>${subtitle}</span></div>
      <div class="collapsed-stat">${total>0?total+'g':'—'}</div>`;
    row.onclick = () => { expandedSlot = i; render(); };
    collapsedEl.appendChild(row);
  }
}

function removeItem(slotIdx, itemIdx){
  state.slots[slotIdx].splice(itemIdx,1);
  saveUserData();
  render();
}

// --- Add meal sheet ---
let expandedSlot = null;

function openSheet(slotIdx){
  pendingSlot = slotIdx;
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.getElementById('stepSearch').classList.add('active');
  document.getElementById('stepPortion').classList.remove('active');
  document.getElementById('sheetTitle').textContent = 'Add meal';
  document.getElementById('foodSearchInput').value = '';
  renderFoodResults('');
  document.getElementById('foodSearchInput').focus();
}

function closeSheet(){
  document.getElementById('sheetBackdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function renderFoodResults(query){
  const all = getAllFoods(state.customFoods);
  const q = query.trim().toLowerCase();
  const results = q ? all.filter(f=>f.name.toLowerCase().includes(q)) : all.slice(0,8);
  const el = document.getElementById('foodResults');
  el.innerHTML = results.map(f => `
    <div class="food-result" onclick="selectFood('${f.id}')">
      <div class="food-swatch">${f.icon}</div>
      <div class="food-info"><h5>${f.name}</h5><span>${f.p100}g protein / 100g</span></div>
      <button class="food-add-btn">+</button>
    </div>`).join('') || `<div class="empty-state">No matches — try a different search.</div>`;
}

function selectFood(id){
  pendingFood = getFood(id, state.customFoods);
  document.getElementById('stepSearch').classList.remove('active');
  document.getElementById('stepPortion').classList.add('active');
  document.getElementById('sheetTitle').textContent = 'Confirm portion';
  document.getElementById('portionFoodName').textContent = pendingFood.icon+' '+pendingFood.name;
  document.getElementById('portionGrams').value = pendingFood.typical;
  updatePortionCalc();

  const pulseSelectEl = document.getElementById('pulseSelect');
  pulseSelectEl.innerHTML = '';
  for (let i=0;i<4;i++){
    const chip = document.createElement('div');
    chip.className = 'pulse-chip' + (i===pendingSlot?' active':'');
    chip.textContent = 'P'+(i+1);
    chip.onclick = () => { pendingSlot = i; document.querySelectorAll('.pulse-chip').forEach((c,ci)=>c.classList.toggle('active',ci===i)); };
    pulseSelectEl.appendChild(chip);
  }
}

function updatePortionCalc(){
  const grams = parseFloat(document.getElementById('portionGrams').value) || 0;
  const protein = pendingFood ? Math.round((grams/100)*pendingFood.p100*10)/10 : 0;
  document.getElementById('portionProtein').textContent = protein+'g';
}

function confirmLog(){
  const grams = parseFloat(document.getElementById('portionGrams').value) || 0;
  const protein = pendingFood ? Math.round((grams/100)*pendingFood.p100*10)/10 : 0;
  if (!state.slots[pendingSlot]) state.slots[pendingSlot] = [];
  state.slots[pendingSlot].push({ name: pendingFood.name, icon: pendingFood.icon, grams, protein, id: pendingFood.id, loggedAt: new Date().toISOString() });
  saveUserData();
  expandedSlot = pendingSlot;
  closeSheet();
  render();
}

document.getElementById('fabBtn').onclick = () => openSheet(activeSlotIndex());
document.getElementById('sheetClose').onclick = closeSheet;
document.getElementById('sheetBackdrop').onclick = closeSheet;
document.getElementById('foodSearchInput').oninput = (e) => renderFoodResults(e.target.value);
document.getElementById('backToSearch').onclick = () => {
  document.getElementById('stepPortion').classList.remove('active');
  document.getElementById('stepSearch').classList.add('active');
  document.getElementById('sheetTitle').textContent = 'Add meal';
};
document.getElementById('portionGrams').oninput = updatePortionCalc;
document.getElementById('confirmLogBtn').onclick = confirmLog;

init();
</script>
</body>
</html>
