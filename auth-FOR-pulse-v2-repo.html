<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f7f8fc;
  --surface: #ffffff;
  --surface2: #eeeef6;
  --border: #e7e6f2;
  --g1: #4f46e5;
  --g2: #3730a3;
  --amber: #d97706;
  --red: #dc2626;
  --text: #161528;
  --muted: #c7c5d8;
  --muted2: #5f5c78;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  letter-spacing: 6px;
  color: var(--g1);
  filter: drop-shadow(0 0 14px rgba(168,230,58,0.5));
  margin-bottom: 6px;
  text-align: center;
}
.logo-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted2);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 36px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 28px;
  width: 100%;
  max-width: 400px;
}
.tabs {
  display: flex;
  gap: 2px;
  background: var(--surface2);
  border-radius: 6px;
  padding: 3px;
  margin-bottom: 28px;
}
.tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted2);
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 2px;
  padding: 8px;
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.tab.active { background: var(--bg); color: var(--g1); }

.field { margin-bottom: 16px; }
.field label {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted2);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  padding: 12px 14px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--g1); }

.submit-btn {
  width: 100%;
  background: var(--g1);
  color: #ffffff;
  border: none;
  border-radius: 6px;
  padding: 13px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 8px;
}
.submit-btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(168,230,58,0.25); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 1px; }

.google-btn {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.google-btn:hover { border-color: var(--muted); }

.msg {
  margin-top: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 1px;
  text-align: center;
  min-height: 18px;
  line-height: 1.6;
}
.msg.error { color: var(--red); }
.msg.success { color: var(--g1); }

.forgot {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted2);
  text-align: right;
  margin-top: -10px;
  margin-bottom: 14px;
  cursor: pointer;
  text-decoration: underline;
}
.forgot:hover { color: var(--g1); }

.back-link {
  margin-top: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  text-align: center;
  letter-spacing: 1px;
}
.back-link a { color: var(--muted2); text-decoration: none; }
.back-link a:hover { color: var(--g1); }
</style>
</head>
<body>

<div class="logo">PULSE</div>
<div class="logo-sub">MPS Protein Tracker</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">SIGN IN</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">CREATE ACCOUNT</button>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="forgot" onclick="handleForgot()">Forgot password?</div>
    <button class="submit-btn" id="login-btn" onclick="handleLogin()">SIGN IN →</button>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR</div>
      <div class="divider-line"></div>
    </div>
    <button class="google-btn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP -->
  <div id="form-signup" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 8 characters" autocomplete="new-password"
             onkeydown="if(event.key==='Enter')handleSignup()">
    </div>
    <button class="submit-btn" id="signup-btn" onclick="handleSignup()">CREATE ACCOUNT →</button>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR</div>
      <div class="divider-line"></div>
    </div>
    <button class="google-btn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Sign up with Google
    </button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<div class="back-link"><a href="index.html">← Back to mpspulse.app</a></div>

<script>
const SUPABASE_URL = 'https://xcfxizkflleeahjguviq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjZnhpemtmbGxlZWFoamd1dmlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTA2ODMsImV4cCI6MjA5NjE4NjY4M30.FhufokzAT16n6zuL9pGn9QHjkENoijU3Wc_umvXEzjQ';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  setMsg('', '');
}

function setMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
}

function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'PLEASE WAIT...' : (btnId === 'login-btn' ? 'SIGN IN →' : 'CREATE ACCOUNT →');
}

async function handleLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  if (!email || !password) { setMsg('Please fill in both fields.', 'error'); return; }
  setLoading('login-btn', true);
  var result = await db.auth.signInWithPassword({ email, password });
  if (result.error) {
    setMsg(result.error.message, 'error');
    setLoading('login-btn', false);
  } else {
    setMsg('Signed in! Loading your app...', 'success');
    setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
  }
}

async function handleSignup() {
  var email = document.getElementById('signup-email').value.trim();
  var password = document.getElementById('signup-password').value;
  if (!email || !password) { setMsg('Please fill in both fields.', 'error'); return; }
  if (password.length < 8) { setMsg('Password must be at least 8 characters.', 'error'); return; }
  setLoading('signup-btn', true);
  var result = await db.auth.signUp({ email, password });
  if (result.error) {
    setMsg(result.error.message, 'error');
    setLoading('signup-btn', false);
  } else {
    setMsg('Account created! Check your email to confirm, then sign in.', 'success');
    setLoading('signup-btn', false);
  }
}

async function handleForgot() {
  var email = document.getElementById('login-email').value.trim();
  if (!email) { setMsg('Enter your email above first.', 'error'); return; }
  var result = await db.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://mpspulse.app/auth.html'
  });
  if (result.error) { setMsg(result.error.message, 'error'); }
  else { setMsg('Password reset email sent. Check your inbox.', 'success'); }
}

async function handleGoogle() {
  await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://YOUR-NEW-DOMAIN/dashboard.html' }
  });
}

// If already logged in, go straight to app
db.auth.getSession().then(function(result) {
  if (result.data.session) {
    window.location.href = 'dashboard.html';
  }
});
</script>
</body>
</html>
